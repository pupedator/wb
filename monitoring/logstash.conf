# Logstash configuration for PixelCyberZone centralized logging

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
  }
  
  # Receive logs via TCP (for direct application logging)
  tcp {
    port => 5000
    codec => json_lines
  }
  
  # Receive logs via UDP
  udp {
    port => 5001
    codec => json_lines
  }
  
  # Receive logs from Docker containers
  gelf {
    port => 12201
  }
}

filter {
  # Parse JSON logs
  if [message] {
    json {
      source => "message"
    }
  }
  
  # Add service identification
  if [service] {
    mutate {
      add_field => { "[@metadata][service]" => "%{service}" }
    }
  }
  
  # Parse NGINX logs
  if [service] == "nginx" {
    grok {
      match => { 
        "message" => '%{IPORHOST:client_ip} - %{USER:ident} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:bytes} "%{DATA:referrer}" "%{DATA:user_agent}" "%{DATA:forwarded_for}" rt=%{NUMBER:request_time} uct="%{DATA:upstream_connect_time}" uht="%{DATA:upstream_header_time}" urt="%{DATA:upstream_response_time}"'
      }
    }
    
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }
    
    mutate {
      convert => { 
        "response_code" => "integer"
        "bytes" => "integer"
        "request_time" => "float"
      }
    }
  }
  
  # Parse application logs
  if [service] in ["user-service", "game-service", "booking-service", "payment-service", "notification-service"] {
    # Extract log level
    if [level] {
      mutate {
        add_field => { "log_level" => "%{level}" }
      }
    }
    
    # Extract error details
    if [error] {
      mutate {
        add_field => { "error_message" => "%{[error][message]}" }
        add_field => { "error_stack" => "%{[error][stack]}" }
      }
    }
    
    # Extract request information
    if [request] {
      mutate {
        add_field => { "request_id" => "%{[request][id]}" }
        add_field => { "request_method" => "%{[request][method]}" }
        add_field => { "request_url" => "%{[request][url]}" }
        add_field => { "user_id" => "%{[request][userId]}" }
      }
    }
  }
  
  # Parse MongoDB logs
  if [service] == "mongodb" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:severity} %{WORD:component} *\[%{DATA:context}\] %{GREEDYDATA:log_message}"
      }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Parse Redis logs
  if [service] == "redis" {
    grok {
      match => { 
        "message" => "%{NUMBER:pid}:%{WORD:role} %{TIMESTAMP_ISO8601:timestamp} %{WORD:level} %{GREEDYDATA:log_message}"
      }
    }
    
    date {
      match => [ "timestamp", "ISO8601" ]
    }
  }
  
  # Add common fields
  mutate {
    add_field => { "environment" => "${ENVIRONMENT:development}" }
    add_field => { "cluster" => "pixelcyberzone" }
  }
  
  # GeoIP enrichment for client IPs
  if [client_ip] and [client_ip] !~ /^(10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/ {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Security log detection
  if [message] =~ /(?i)(attack|hack|exploit|injection|xss|csrf|malware)/ {
    mutate {
      add_tag => ["security_alert"]
      add_field => { "alert_type" => "security" }
    }
  }
  
  # Performance log detection
  if [request_time] and [request_time] > 5 {
    mutate {
      add_tag => ["performance_alert"]
      add_field => { "alert_type" => "performance" }
    }
  }
  
  # Error log detection
  if [log_level] in ["ERROR", "FATAL"] or [response_code] >= 500 {
    mutate {
      add_tag => ["error_alert"]
      add_field => { "alert_type" => "error" }
    }
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "pixelcyberzone-logs-%{+YYYY.MM.dd}"
    
    # Template for index mapping
    template_name => "pixelcyberzone"
    template => {
      "index_patterns" => ["pixelcyberzone-logs-*"]
      "settings" => {
        "number_of_shards" => 1
        "number_of_replicas" => 0
        "refresh_interval" => "5s"
      }
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" }
          "service" => { "type" => "keyword" }
          "log_level" => { "type" => "keyword" }
          "message" => { "type" => "text" }
          "request_time" => { "type" => "float" }
          "response_code" => { "type" => "integer" }
          "user_id" => { "type" => "keyword" }
          "client_ip" => { "type" => "ip" }
          "geoip" => {
            "properties" => {
              "location" => { "type" => "geo_point" }
              "country_name" => { "type" => "keyword" }
              "city_name" => { "type" => "keyword" }
            }
          }
        }
      }
    }
  }
  
  # Service-specific indexes
  if [service] == "user-service" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "pixelcyberzone-user-logs-%{+YYYY.MM.dd}"
    }
  }
  
  if [service] == "payment-service" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "pixelcyberzone-payment-logs-%{+YYYY.MM.dd}"
    }
  }
  
  # Security alerts to separate index
  if "security_alert" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "pixelcyberzone-security-alerts-%{+YYYY.MM.dd}"
    }
  }
  
  # Performance alerts to separate index
  if "performance_alert" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "pixelcyberzone-performance-alerts-%{+YYYY.MM.dd}"
    }
  }
  
  # Error alerts to separate index
  if "error_alert" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "pixelcyberzone-error-alerts-%{+YYYY.MM.dd}"
    }
  }
  
  # Debug output (comment out in production)
  if [environment] == "development" {
    stdout {
      codec => rubydebug
    }
  }
}
