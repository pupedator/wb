# NGINX Load Balancer Configuration for PixelCyberZone
# This configuration provides load balancing, SSL termination, and static asset serving

# Main context
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

# Optimize worker connections
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Backend server upstream configuration
    upstream pixelcyberzone_backend {
        # Load balancing method: least_conn for better distribution
        least_conn;
        
        # Backend servers (add more as needed)
        server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3003 weight=1 max_fails=3 fail_timeout=30s;
        
        # Health check
        keepalive 32;
    }

    # API Gateway upstream
    upstream api_gateway {
        server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # WebSocket upstream for real-time features
    upstream websocket_backend {
        ip_hash; # Sticky sessions for WebSocket connections
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;
    }

    # Cache configuration
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m 
                     max_size=1g inactive=60m use_temp_path=off;

    # Main server block
    server {
        listen 80;
        listen [::]:80;
        server_name pixelcyberzone.local localhost;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Rate limiting
        limit_req zone=general burst=20 nodelay;
        limit_conn perip 10;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 'healthy\\n';
            add_header Content-Type text/plain;
        }

        # Static assets with CDN-like caching
        location /assets/ {
            alias /var/www/pixelcyberzone/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Served-By "nginx-lb";
            
            # CORS for assets
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            
            # Optimize asset delivery
            gzip_static on;
            brotli_static on;
        }

        # API routes through API Gateway
        location /api/ {
            # Rate limiting for API
            limit_req zone=api burst=10 nodelay;
            
            # Proxy settings
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;

            # Caching for GET requests
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            # Cache headers
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Authentication routes with stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # No caching for auth routes
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # WebSocket connections for real-time features
        location /socket.io/ {
            proxy_pass http://websocket_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket specific timeouts
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 5s;
        }

        # Frontend application (React)
        location / {
            # Try files first, then fallback to backend for SPA routing
            try_files $uri $uri/ @backend;
            
            # Cache static files
            location ~* \\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Served-By "nginx-lb";
            }
        }

        # Fallback to backend for SPA routing
        location @backend {
            proxy_pass http://pixelcyberzone_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SPA specific headers
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Admin routes with additional security
        location /admin/ {
            # Stricter rate limiting for admin
            limit_req zone=auth burst=3 nodelay;
            
            # IP whitelist for admin (uncomment and configure as needed)
            # allow 192.168.1.0/24;
            # allow 10.0.0.0/8;
            # deny all;
            
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }

    # SSL/HTTPS server block (for production)
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name pixelcyberzone.com www.pixelcyberzone.com;

        # SSL configuration (update paths for your certificates)
        ssl_certificate /etc/ssl/certs/pixelcyberzone.crt;
        ssl_certificate_key /etc/ssl/private/pixelcyberzone.key;
        
        # SSL optimization
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Include all the same location blocks as HTTP server
        include /etc/nginx/conf.d/pixelcyberzone-locations.conf;
    }

    # Redirect HTTP to HTTPS (for production)
    server {
        listen 80;
        listen [::]:80;
        server_name pixelcyberzone.com www.pixelcyberzone.com;
        return 301 https://$server_name$request_uri;
    }
}

# Stream block for TCP/UDP load balancing (if needed)
stream {
    # Database load balancing (if using MongoDB replica set)
    upstream mongodb_cluster {
        server mongodb1.internal:27017 weight=1 max_fails=3 fail_timeout=30s;
        server mongodb2.internal:27017 weight=1 max_fails=3 fail_timeout=30s;
        server mongodb3.internal:27017 weight=1 max_fails=3 fail_timeout=30s;
    }
    
    # Redis cluster load balancing
    upstream redis_cluster {
        server redis1.internal:6379 weight=1 max_fails=3 fail_timeout=30s;
        server redis2.internal:6379 weight=1 max_fails=3 fail_timeout=30s;
    }
}
